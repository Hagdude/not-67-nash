<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Dinosaur Game</title>
    <style>
        * { padding: 0; margin: 0; }
        #game { width: 500px; height: 200px; border: 1px solid black; margin: auto; overflow: hidden; }
        #character { width: 20px; height: 50px; background-color: red; position: relative; top: 150px; }
        #block { width: 20px; height: 20px; background-color: blue; position: relative; top: 130px; left: 480px; animation: block 1s infinite linear; }
        .animate { animation: jump 0.5s linear; }
        @keyframes jump {
            0% { top: 150px; }
            30% { top: 100px; }
            70% { top: 100px; }
            100% { top: 150px; }
        }
        @keyframes block {
            0% { left: 480px; }
            100% { left: -20px; }
        }
    </style>
</head>
<body onclick="jump()">
    <div id="game">
        <div id="character"></div>
        <div id="block"></div>
    </div>
    <script>
        var character = document.getElementById("character");
        var block = document.getElementById("block");
        function jump() {
            if (character.classList != "animate") {
                character.classList.add("animate");
            }
            setTimeout(function() {
                character.classList.remove("animate");
            }, 500);
        }
        var checkDead = setInterval(function() {
            let characterTop = parseInt(window.getComputedStyle(character).getPropertyValue("top"));
            let blockLeft = parseInt(window.getComputedStyle(block).getPropertyValue("left"));
            if (blockLeft < 20 && blockLeft > 0 && characterTop >= 130) {
                block.style.animation = "none";
                alert("Game Over");
                location.reload();
            }
        }, 10);
    </script>
</body>
</html>
